function createFlatRingGeometry(outerRadius, innerRadius, height) {
  if (innerRadius >= outerRadius) {
    throw new Error("innerRadius must be smaller than outerRadius");
  }

  const shape = new THREE.Shape();

  // Outer circle
  shape.absarc(0, 0, outerRadius, 0, Math.PI * 2, false);

  // Inner hole
  const hole = new THREE.Path();
  hole.absarc(0, 0, innerRadius, 0, Math.PI * 2, true);

  shape.holes.push(hole);

  const geometry = new THREE.ExtrudeGeometry(shape, {
    depth: height,
    bevelEnabled: false,
    curveSegments: 16,
  });

  // Center it vertically so it extrudes around origin
  geometry.translate(0, 0, -height / 2);

  geometry.rotateX(-Math.PI / 2);

  geometry.computeVertexNormals();

  return geometry;
}

//CUSTOM GEO FUNCTIONS
function makeSlope3040(w=2,d=1){
  const geo = new THREE.BufferGeometry();

  const hw=w/2, hd=d/2;

  const vertices = new Float32Array([
    // bottom
    -hw,0,-hd,   hw,0,-hd,   hw,0,hd,
    -hw,0,-hd,   hw,0,hd,    -hw,0,hd,

    // sloped top face
    -hw,1,-hd,   hw,1,-hd,   hw,0,hd,
    -hw,1,-hd,   hw,0,hd,    -hw,0,hd,

    // back face
    -hw,0,-hd,   hw,0,-hd,   hw,1,-hd,
    -hw,0,-hd,   hw,1,-hd,   -hw,1,-hd,

    // sides
    -hw,0,-hd,   -hw,0,hd,   -hw,1,-hd,
    -hw,0,hd,    -hw,1,-hd,  -hw,1,hd,

    hw,0,-hd,    hw,1,-hd,   hw,0,hd,
    hw,0,hd,     hw,1,-hd,   hw,1,hd
  ]);

  geo.setAttribute("position", new THREE.BufferAttribute(vertices,3));
  geo.computeVertexNormals();

  return geo;
}

const COLORS = [
  // basic
  0xff0000, // Red

function colorToIndex(hex) {
  return COLORS.indexOf(hex);
}

function indexToColor(i) {

}

const key = (x,y,z)=>`${x},${y},${z}`;
const isOccupied = (x,y,z)=>occupied.has(key(x,y,z));
const setOccupied = (x,y,z)=>occupied.add(key(x,y,z));

function columnHeight(x,y,z){
  while(isOccupied(x,y,z)) y++; return y;
}

// Serialization
function encodeCoord(v) {
  return v + GRID_HALF;
}

function decodeCoord(v) {
  return v - GRID_HALF;
}

function packBrick(b) {
  const id = b.id & 31;
  const c  = b.c & 15; // 16 colors

  const x = (b.x + GRID_HALF) & 31;
  const z = (b.z + GRID_HALF) & 31;
  const y = b.y & 31;

  const r = b.r & 3;

  return (
    id |
    (c << 5) |
    (x << 9) |
    (z << 14) |
    (y << 19) |
    (r << 24)
  ) >>> 0;
}

function unpackBrick(v) {
  return {
    id: (v) & 31,
    c:  (v >> 5) & 15,

    x: ((v >> 9) & 31) - GRID_HALF,
    z: ((v >> 14) & 31) - GRID_HALF,

    y:  (v >> 19) & 31,
    r:  (v >> 24) & 3
  };
}

function encodeState() {
  const arr = blockHistory.map(h =>
    packBrick({
      id: h.id,
      c: colorToIndex(h.c),
      x: h.x,
      y: h.y,
      z: h.z,
      r: (h.r / 90) & 3
    })
  );

  const buffer = new Uint32Array(arr);

  return base64urlEncode(buffer);
}

function base64urlEncode(uint32Array) {
  const bytes = new Uint8Array(uint32Array.buffer);

  let binary = "";
  for (let i = 0; i < bytes.length; i++) {
    binary += String.fromCharCode(bytes[i]);
  }

  return btoa(binary)
    .replace(/\+/g, "-")
    .replace(/\//g, "_")
    .replace(/=+$/, "");
}

function base64urlDecode(str) {
  str = str.replace(/-/g, "+").replace(/_/g, "/");
  while (str.length % 4) str += "=";

  const binary = atob(str);

  const bytes = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) {
    bytes[i] = binary.charCodeAt(i);
  }

  return new Uint32Array(bytes.buffer);
}

function decodeState(str) {
  const arr = base64urlDecode(str);

  return Array.from(arr).map(v => {
    const b = unpackBrick(v);
    const def = BRICKS[b.id];

    return {
      id: b.id,
      c: indexToColor(b.c),
      x: b.x,
      y: b.y,
      z: b.z,
      w: def.w,
      d: def.d,
      r: b.r * 90,
      group: null
    };
  });
}

function updateShareURL() {
  const encoded = encodeState();
  const url = `${location.origin}${location.pathname}#${encoded}`;
  history.replaceState(null, "", url);
}

function loadFromHistory(deserializedHistory) {
  if (!deserializedHistory) return;

  // reset everything
  blockHistory.length = 0;
  redoStack.length = 0;

  // clear scene (keep base)
  for (let i = scene.children.length - 1; i >= 0; i--) {
    const obj = scene.children[i];
    if (obj === preview) continue;
    if (obj === base) continue;
    if (obj.isLight) continue;
    scene.remove(obj);
  }

  colliders.length = 1;
  occupied.clear();

  // build queue instead of instant placement
  buildQueue = [...deserializedHistory];
  totalBuildCount = buildQueue.length;
  builtCount = 0;
  isBuilding = true;

  buildNextBrick();
}

// ANimation
let totalBuildCount = 0;
let builtCount = 0;

function getSpawnDelay(progress) {
  const minDelay = 30;   // fastest (end)
  const maxDelay = 200;  // slow start

  // ease-in (accelerating spawn rate)
  const t = progress;
  const eased = t * t * t; // cubic

  return maxDelay - (maxDelay - minDelay) * eased;
}

function buildNextBrick() {
  if (!buildQueue.length) {
    isBuilding = false;
    return;
  }

  const h = buildQueue.shift();
  const def = BRICKS[h.id];
  if (!def) {
    buildNextBrick();
    return;
  }

  let hist = placeBlock(h.id, h.x, h.y, h.z, h.r, h.c);
  let group = hist.group;

  const targetY = group.position.y;
  group.position.set(
    group.position.x,
    group.position.y  + 5 + Math.random() * 2,
    group.position.z
  );

  // animation
  let velocity = 0;
  const gravity = -0.05;

  function fall() {
    velocity += gravity;
    group.position.y += velocity;

    if (group.position.y <= targetY) {
      group.position.y = targetY;

      // small "settle" effect
      group.position.y += 0.1;
      setTimeout(() => {
        group.position.y = targetY;
        buildNextBrick();
      }, 50);

      return;
    }

    requestAnimationFrame(fall);
  }

  fall();

  builtCount++;

  const progress = builtCount / totalBuildCount;
  const delay = getSpawnDelay(progress);

  setTimeout(buildNextBrick, delay);
}

// --------------------
// HISTORY (UNDO/REDO)
// --------------------
let blockHistory = [];
const redoStack = [];

function pushHistory(entry){
  blockHistory.push(entry);
  redoStack.length = 0;
}

function undo(){
  const h = blockHistory.pop();
  if(!h) return;

  scene.remove(h.group);
  redoStack.push(h);

  rebuild();
  updateShareURL();
}

function redo(){
  const h = redoStack.pop();
  if(!h) return;

  scene.add(h.group);
  blockHistory.push(h);
  const blockPos = computeBrickPos(h.x, h.y, h.z, h.w, h.d, h.r);
  occupy(blockPos.x,h.y,blockPos.z,h.w,h.d);
  updateShareURL();
}

function rebuild(){
  occupied.clear();
  for(const h of blockHistory){ 
    const blockPos = computeBrickPos(h.x, h.y, h.z, h.w, h.d, h.r);
    occupy(blockPos.x,h.y,blockPos.z,h.w,h.d);
  }
}


function getFootprint(brickId, rot)
{
  const b = BRICKS[brickId];
  return (rot % 180 === 0) ? [b.w,b.d] : [b.d,b.w];
}

function computePlacement(x,y,z,w,d){
  let maxY=0, support=false;

  for(let i=0;i<w;i++) for(let j=0;j<d;j++){
    maxY=Math.max(maxY,columnHeight(x+i,y,z+j));
  }

  for(let i=0;i<w;i++) for(let j=0;j<d;j++){
    if(isOccupied(x+i,maxY,z+j)) return {valid:false,y:0};
  }

  for(let i=0;i<w;i++) for(let j=0;j<d;j++){
    if(isOccupied(x+i,maxY-1,z+j)) support=true;
  }

  if(maxY===0) support=true;
  return {valid:support,y:maxY};
}

function computeBrickPos(x, y, z, w, d, rot)
{
  const signX = rot == 90 ? -1 : 1;
  const signZ = rot == 180 ? -1 : 1;
  const offX = rot == 90 ? 1 : 0;
  const offZ = rot == 180 ? 1 : 0;

  return { 
    x: x + (w/2 * signX) + offX,
    y: y + 0.5, 
    z: z + (d/2 * signZ) + offZ 
  };
}

function getOccupancy(x, y, z, w, d, rot)
{
    let cells = [];
    const brickPos = computeBrickPos(x,y,z,w,d,rot);
    for(let i=0;i<w;i++) {
        for(let j=0;j<d;j++) {
            cells.push({
                x: snap(brickPos.x+i - w/2),
                y, 
                z: snap(brickPos.z+j - d/2)
            })
        }
    }
    return cells;
}

function occupy(x,y,z,w,d){
  for(let i=0;i<w;i++) {
    for(let j=0;j<d;j++) {
      setOccupied(snap(x+i - w/2), y, snap(z+j - d/2));
    }
  }
}

function shiftBlock(body)
{
    const shiftVal = (Math.random() * 2 - 1) * shift;
    body.position.x += shiftVal;
    body.position.z += shiftVal;
    body.rotation.y += shiftVal;
}

function createBrick(w,d,color,transparent=false,type="box",hollowStud=false){
  const group=new THREE.Group();

  const mat=new THREE.MeshStandardMaterial({
    color, 
    transparent, 
    opacity:transparent ? 0.5 : 1, 
    roughness: 0.8,
  });

  const studGeoToUse = hollowStud ? hollowStudGeo : studGeo;
  let body;

  if(type === "box"){
      body=new THREE.Mesh(new THREE.BoxGeometry(w-gap,1-gap*0.5,d-gap),mat);

    for(let i=0;i<w;i++) for(let j=0;j<d;j++){
      const stud=new THREE.Mesh(studGeoToUse,mat);
      stud.position.set(i-w/2+0.5,0.6,j-d/2+0.5);
      stud.castShadow = true;
      stud.receiveShadow = true;
      group.add(stud);
    }
  }
  else if(type === "tile"){
    body=new THREE.Mesh(new THREE.BoxGeometry(w - gap,0.2,d - gap),mat);
    body.position.y = -0.2 - studH;
  }
  else if(type === "cylinder"){
    const rad = w == 1 ? 0.45 : w/2;
    body=new THREE.Mesh(new THREE.CylinderGeometry(rad - gap, rad - gap, 1, 24),mat);
    for(let i=0;i<w;i++)
    {
      for(let j=0;j<d;j++){
        const stud=new THREE.Mesh(studGeoToUse,mat);
        stud.position.set(i-w/2+0.5,0.6,j-d/2+0.5);
        stud.castShadow = true;
        stud.receiveShadow = true;
        group.add(stud);
      }
    }
  }
  else if(type === "slope"){
    body=new THREE.Mesh(new THREE.BoxGeometry(w,1,d),mat);
    body.rotation.x = -0.5;
    body.position.y = 0.5;
  }
  else if(type === "slope_3040"){
    const geo = new THREE.BoxGeometry(w,1,d,1,1,1);
    geo.translate(0,0.5,0);
    geo.vertices?.forEach?.(() => {}); // placeholder (ignored in r160)

    body = new THREE.Mesh(geo, mat);
    body.rotation.x = -Math.PI / 4;
    body.position.y = 0.5;
  }
  else if(type === "cone"){
    body = new THREE.Mesh(
      new THREE.CylinderGeometry(0.3, 0.45,0.8,20),
      mat
    );
    body.position.y += 0.1;
    

    const stud = new THREE.Mesh(studGeoToUse,mat);
    stud.position.set(0,0.6,0);
    stud.castShadow = true;
    stud.receiveShadow = true;
    group.add(stud);

    const studBase = new THREE.Mesh(new THREE.CylinderGeometry(0.36, 0.36, 0.2, 16), mat);
    studBase.position.set(0, -0.4, 0);
    studBase.castShadow = true;
    studBase.receiveShadow = true;
    group.add(studBase);
  }
  else if(type === "flag"){
    const pole = new THREE.Mesh(
      new THREE.CylinderGeometry(0.05,0.05,1.2,12),
      new THREE.MeshStandardMaterial({color:0xdddddd})
    );

    const flag = new THREE.Mesh(
      new THREE.PlaneGeometry(1,0.6),
      mat
    );

    flag.position.set(0.5,0.3,0);

    group.add(pole);
    group.add(flag);

    body = pole;
  }
  else if(type === "flame"){
    const flameMat = new THREE.MeshStandardMaterial({
      color:0xff7a18,
      transparent:true,
      opacity:0.7
    });

    body = new THREE.Mesh(
      new THREE.ConeGeometry(0.4,1.2,12),
      flameMat
    );

  }
  else if(type === "door"){
    const frame = new THREE.Mesh(
      new THREE.BoxGeometry(w,1.8,d),
      mat
    );

    const opening = new THREE.Mesh(
      new THREE.BoxGeometry(w*0.7,1.5,d*1.1),
      new THREE.MeshStandardMaterial({color:0x111111})
    );

    opening.position.y = -0.2;

    group.add(frame);
    group.add(opening);

    body = frame;
  }
  else if(type === "window"){
    const frame = new THREE.Mesh(
      new THREE.BoxGeometry(w,1.5,d),
      mat
    );

    const glass = new THREE.Mesh(
      new THREE.PlaneGeometry(w*0.8,1),
      new THREE.MeshStandardMaterial({
        color:0xaad4ff,
        transparent:true,
        opacity:0.4
      })
    );

    glass.position.z = d/2 + 0.01;

    group.add(frame);
    group.add(glass);

    body = frame;
  }


  body.castShadow = true;
  body.receiveShadow = true;

  group.add(body);
  shiftBlock(body);
  return {group,body};
}

// --------------------
// PREVIEW
// --------------------
let preview;
let previewState={x:0,z:0,y:0,valid:false};

function updatePreview(){
  if(preview) scene.remove(preview);

  const b = BRICKS[currentBrick];
  const obj = createBrick(b.w,b.d,currentColor,true,b.type,b.hollowStud);
  preview = obj.group;
  preview.rotation.y = rotation*Math.PI/180;
  scene.add(preview);
}

updatePreview();

function updatePreviewColor(valid){
  preview.traverse(o=>{
    if(o.material) o.material.color.set(valid?currentColor:0xff0000);
  });
}

function snap(p){
  return Math.floor(p + gridSize/2) - gridSize/2;
}

function updatePreviewPos()
{
  raycaster.setFromCamera(mouse,camera);
  const hits=raycaster.intersectObjects(colliders);

  if(!hits.length) return;

  const p=hits[0].point;
  const [w,d]=getFootprint(currentBrick, rotation);

  const x=snap(p.x);
  const y=snap(p.y);
  const z=snap(p.z);

  const occupancy = getOccupancy(x,y,z,w,d,rotation);
  const res = computePlacement(x, y, z, w, d);
  const realPos = computeBrickPos(x,res.y,z,w,d,rotation);

  previewState={x: x, z: z, y:res.y,valid:res.valid };
  
  preview.position.set(
    realPos.x,
    realPos.y,
    realPos.z,
  );
  updatePreviewColor(res.valid);
}

function placeBlock(brickId, x, y, z, rot, color)
{
    const [w,d]=getFootprint(brickId, rot);

    const blockPos = computeBrickPos(x, y, z, w, d, rot);

    const def=BRICKS[brickId];
    const obj=createBrick(def.w,def.d,color,false,def.type,def.hollowStud);
    const group=obj.group;

    group.rotation.y = rot*Math.PI/180;

    group.position.set(blockPos.x, y+0.5, blockPos.z);

    scene.add(group);

    //console.log("oth: ", w, d, rot)
    //console.log("coords: ", x,y,z)
    //console.log(blockPos)

    colliders.push(obj.body);
    occupy(blockPos.x, y, blockPos.z, w, d);
    const h = {
        id: brickId,
        c: color,
        x: x,
        y,
        z: z,
        w: w,
        d: d,
        r: rot,
        group: group
    };
    pushHistory(h);

    return h;
}

window.addEventListener("mousemove",e=>{
  mouse.x=(e.clientX/window.innerWidth)*2-1;
  mouse.y=-(e.clientY/(window.innerHeight + 58))*2+1;

  updatePreviewPos();
});

window.addEventListener("click",e=>{
    if (isBuilding) return;

  if(e.target.closest('#ui')) return;

  const {x,z,y,valid}=previewState;
  if(!valid) return;

  placeBlock(currentBrick, x, y, z, rotation, currentColor)

  updateShareURL();
  updatePreview();
  updatePreviewPos();
});

window.addEventListener("keydown",e=>{
  if(e.key.toLowerCase()==='r'){ 
    rotation=(rotation+90)%360;
    updatePreview();
    updatePreviewPos();
}
  if(e.key.toLowerCase()==='z') undo();
  if(e.key.toLowerCase()==='y') redo();
});

// UI
const brickButtonsDiv=document.getElementById("brickButtons");
Object.keys(BRICKS).forEach(id=>{
  const btn=document.createElement("button");
  btn.textContent=BRICKS[id].name;
  btn.onclick=()=>{currentBrick=id;updatePreview();updateActive();};
  brickButtonsDiv.appendChild(btn);
});

const colorButtonsDiv=document.getElementById("colorButtons");
COLORS.forEach(color=>{
  const btn=document.createElement("button");
  btn.style.background=`#${color.toString(16).padStart(6,'0')}`;
  btn.onclick=()=>{currentColor=color;updatePreview();updateActive();};
  colorButtonsDiv.appendChild(btn);
});

function updateActive(){
  [...brickButtonsDiv.children].forEach(btn=>btn.classList.toggle("active",btn.textContent===BRICKS[currentBrick].name));
  [...colorButtonsDiv.children].forEach(btn=>{
    const c=parseInt(btn.style.background.slice(1),16);
    btn.classList.toggle("active",c===currentColor);
  });
}
updateActive();

// FIXED zoom (orthographic)
window.addEventListener("wheel",e=>{
  const factor = e.deltaY < 0 ? 1.1 : 0.9;
  camera.zoom *= factor;
  camera.zoom = Math.max(0.5, Math.min(5, camera.zoom));
  camera.updateProjectionMatrix();
});

// FIXED camera controls
let dragging=false,prevX=0,prevY=0;
window.addEventListener("mousedown",e=>{
  if(e.button===2){dragging=true;prevX=e.clientX;prevY=e.clientY;}
});
window.addEventListener("mouseup",()=>dragging=false);
window.addEventListener("mousemove",e=>{
  if(!dragging) return;

  const dx=e.clientX-prevX;
  const dy=e.clientY-prevY;
  prevX=e.clientX; prevY=e.clientY;

  theta-=dx*0.005;
  phi-=dy*0.005;

  phi=Math.max(0.1,Math.min(Math.PI-0.1,phi));

  updateCamera();
});

window.addEventListener("resize",()=>{
  const aspect=window.innerWidth/window.innerHeight;
  camera.left=-d*aspect;
  camera.right=d*aspect;
  camera.top=d;
  camera.bottom=-d;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
});

function animate(){
  requestAnimationFrame(animate);
  renderer.render(scene,camera);
}
animate();

(function initLoad() {
  const hash = location.hash.slice(1);
  if (!hash) return;

  const state = decodeState(hash);
  loadFromHistory(state);
})();


const debugMat=new THREE.MeshStandardMaterial({
    color: 0xff0000, 
    transparent: true, 
    opacity: 0.5, 
    roughness: 0.8,
  });
let occupiedDebug = [];
function debugOccupy(){
  
  
    for (let b of occupiedDebug)
      scene.remove(b);

    for(let x=-gridSize; x<gridSize; x++) {
        for(let y=-gridSize; y<gridSize; y++) {
            for(let z=-gridSize; z<gridSize; z++) {
                if (isOccupied(x, y, z))
                {
                    let body=new THREE.Mesh(new THREE.BoxGeometry(1, 1.3, 1), debugMat);
                    body.position.set(x+0.5,y+0.5,z+0.5);
                    scene.add(body);
                    occupiedDebug.push(body)
                }
            }
        }
    }
}
