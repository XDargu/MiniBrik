<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>MiniBrik - Build and share your brick creations!</title>
  <meta name="description" content="MiniBrik is a small tool to create and share brick creationes, inspired by LEGO and other building toys">
  <meta name="keywords" content="brick, lego, block, blocks, brik, mini, small, minibrik">
  <meta name="author" content="Daniel Armesto">

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "MiniBrik",
    "url": "https://xdargu.github.io/MiniBrik/",
    "description": "Brick editing tool to create and share small scenes.",
    "applicationCategory": "DesignApplication",
    "operatingSystem": "Web",
    "author": {
      "@type": "Person",
      "name": "Daniel Armesto"
    }
  }
  </script>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div id="sidetitle">
    <img src="img/icon.png" alt="minibrik and logo">
    <div id="title">MiniBrik</div>
</div>
<div id="ui">
  <div><b>Bricks</b></div>
  <div id="brickButtons"></div>
  <div style="margin-top:8px"><b>Colors</b></div>
  <div id="colorButtons"></div>
  <div style="margin-top:8px">R = rotate | Z = undo | Y = redo</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
