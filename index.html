<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>MiniBrik - Build and share your brick creations!</title>
  <meta name="description" content="MiniBrik is a small tool to create and share brick creationes, inspired by LEGO and other building toys">
  <meta name="keywords" content="brick, lego, block, blocks, brik, mini, small, minibrik">
  <meta name="author" content="Daniel Armesto">

  <meta name="google-site-verification" content="Tdi4ds4wGpTJVlhqQGM6AjeJpwYXXpbjp45eaX-C9eQ" />

  <!-- JSON-LD structured data -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "MiniBrik",
    "url": "https://xdargu.github.io/MiniBrik/",
    "description": "Brick editing tool to create and share small scenes.",
    "applicationCategory": "DesignApplication",
    "operatingSystem": "Web",
    "author": {
      "@type": "Person",
      "name": "Daniel Armesto"
    }
  }
  </script>

  <link rel="shortcut icon" type="image/x-icon" href="favicon.ico">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div id="topbar">
  <div id="sidetitle">
    <img src="img/icon.png" alt="minibrik and logo">
    <div id="title">MiniBrik</div>
  </div>
  <select id="exampleSelect">
    <option value="" disabled selected hidden>Load example build...</option>
  </select>
</div>

<div id="controls">
    <button id="audioToggle">Sound: on</button>
    <button id="clearBuild">Clear</button>
</div>

<div id="ui">
  <div id="brickButtons"></div>
  <div id="colorButtons"></div>
  <div id="presetButtons"></div>
  <div style="margin-top:8px">R = rotate | E = change pivot | Z = undo | Y = redo</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/lz-string@1.5.0/libs/lz-string.min.js"></script>

<script src="js/environment.js"></script>
<script src="js/geometry.js"></script>
<script src="js/constants.js"></script>
<script src="js/grid.js"></script>
<script src="js/bricks.js"></script>
<script src="js/scene.js"></script>
<script src="js/serialization.js"></script>
<script src="js/camera.js"></script>
<script src="js/audio.js"></script>
<script src="js/thumbnails.js"></script>
<script src="js/history.js"></script>
<script src="js/input.js"></script>
<script src="js/minibrik.js"></script>
<script src="js/debug.js"></script>
</body>
</html>
